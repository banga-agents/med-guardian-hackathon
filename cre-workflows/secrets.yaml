# MedGuardian Secrets Configuration
# These secrets are stored in the Vault DON and injected at runtime

secretsNames:
  # Health Service API Key
  # Used for internal health data processing
  healthServiceKey:
    - HEALTH_SERVICE_KEY_ALL

  # External Storage API Key
  # Used for encrypted IPFS/storage operations
  storageApiKey:
    - STORAGE_API_KEY_ALL

  # OpenAI API Key
  # Used for AI-powered health report generation
  openaiKey:
    - OPENAI_KEY_ALL

  # AES-256-GCM Encryption Key
  # Used for encrypting responses from the secure enclave
  # Must be a 32-byte hex-encoded string
  san_marino_aes_gcm_encryption_key:
    - AES_KEY_ALL
